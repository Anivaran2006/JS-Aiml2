<!doctype html>
<html>
<head>
<title>Student Result</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        text-align: center;
        color: #333;
    }

    .container {
        background: white;
        width: 350px;
        margin: 60px auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
        color: #4facfe;
    }

    button {
        padding: 10px 20px;
        border: none;
        background: #4facfe;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #007bff;
    }

    .output {
        margin-top: 20px;
        font-weight: bold;
        line-height: 1.6;
        color: #444;
    }
</style>

</head>

<body>

<div class="container">
    <h2>Student Result Program</h2>
    <button onclick="runProgram()">Start</button>

    <div class="output" id="result"></div>
</div>

<script>
function runProgram() {
    var subjects = prompt("Enter number of subjects");
    var total = 0;

    for (var i = 1; i <= subjects; i++) {
        var marks = prompt("Enter marks of subject " + i);
        total = total + Number(marks);
    }

    var average = total / subjects;
    var grade;
    var result;

    if (average >= 60) {
        grade = "A";
        result = "Pass";
    } else if (average >= 50) {
        grade = "B";
        result = "Pass";
    } else if (average >= 40) {
        grade = "C";
        result = "Pass";
    } else {
        grade = "D";
        result = "Fail";
    }

    document.getElementById("result").innerHTML =
        "Total Marks = " + total + "<br>" +
        "Average Marks = " + average.toFixed(2) + "<br>" +
        "Grade = " + grade + "<br>" +
        "Result = " + result;
}
</script>

</body>
</html>
