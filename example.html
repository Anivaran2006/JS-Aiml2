<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Gender Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@0.0.3/dist/face-landmarks-detection.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.2em;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .video-container {
            position: relative;
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #000;
        }

        .result-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .result-overlay.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gender-male {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
        }

        .gender-female {
            background: linear-gradient(45deg, #fa709a, #fee140);
            color: white;
        }

        .confidence {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-start {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        .btn-stop {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-stop:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(108, 92, 231, 0.6);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.3);
        }

        .status.ready {
            background: rgba(40, 167, 69, 0.3);
        }

        .no-face {
            color: #ff6b6b;
            font-size: 1.1em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Face Gender Detector</h1>
        <p style="margin-bottom: 20px; opacity: 0.9;">Point your camera and see the magic! ✨</p>
        
        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div id="resultOverlay" class="result-overlay"></div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn-start">🚀 Start Detection</button>
            <button id="stopBtn" class="btn-stop" disabled>⏹️ Stop</button>
        </div>
        
        <div id="status" class="status">Loading AI models...</div>
        <div id="noFace" class="no-face" style="display: none;">No face detected 😅</div>
    </div>

    <script>
        class GenderDetector {
            constructor() {
                this.video = document.getElementById('video');
                this.overlay = document.getElementById('resultOverlay');
                this.status = document.getElementById('status');
                this.noFaceDiv = document.getElementById('noFace');
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                
                this.faceLandmarksModel = null;
                this.isDetecting = false;
                this.animationId = null;
                
                this.init();
            }

            async init() {
                try {
                    this.status.textContent = 'Loading Face Detection model...';
                    this.status.className = 'status loading';
                    
                    // Load face landmarks detection model
                    this.faceLandmarksModel = await faceLandmarksDetection.load(
                        faceLandmarksDetection.SupportedPackages.mediapipeFacemesh
                    );
                    
                    this.status.textContent = 'Ready! Click Start Detection';
                    this.status.className = 'status ready';
                    this.startBtn.disabled = false;
                    
                } catch (error) {
                    console.error('Error loading model:', error);
                    this.status.textContent = 'Error loading model. Please refresh.';
                    this.status.className = 'status';
                }
            }

            async startVideo() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { width: 640, height: 480 } 
                    });
                    this.video.srcObject = stream;
                    await this.video.play();
                } catch (error) {
                    console.error('Error accessing camera:', error);
                    alert('Camera access denied. Please allow camera permission.');
                }
            }

            async detectGender() {
                if (!this.faceLandmarksModel || !this.video.videoWidth) return;

                const predictions = await this.faceLandmarksModel.estimateFaces({
                    input: this.video
                });

                if (predictions.length > 0) {
                    // Simple gender estimation based on facial features
                    // Using jawline width-to-height ratio and forehead size
                    const landmarks = predictions[0].keypoints;
                    
                    // Key facial landmarks indices (MediaPipe FaceMesh)
                    const LEFT_EYE = 33;  // Left eye outer
                    const RIGHT_EYE = 362; // Right eye outer
                    const NOSE_TIP = 1;   // Nose tip
                    const JAW_LEFT = 234; // Jaw left
                    const JAW_RIGHT = 454;// Jaw right
                    const FOREHEAD = 10;  // Forehead center

                    const leftEye = landmarks[LEFT_EYE];
                    const rightEye = landmarks[RIGHT_EYE];
                    const jawLeft = landmarks[JAW_LEFT];
                    const jawRight = landmarks[JAW_RIGHT];
                    const forehead = landmarks[FOREHEAD];

                    // Calculate facial ratios
                    const faceWidth = Math.abs(jawRight.x - jawLeft.x);
                    const faceHeight = Math.abs(forehead.y - (jawLeft.y + jawRight.y) / 2);
                    const eyeDistance = Math.abs(rightEye.x - leftEye.x);
                    
                    const jawRatio = faceWidth / faceHeight; // Wider jaw = more likely male
                    const eyeToJawRatio = eyeDistance / faceWidth;

                    // Gender prediction logic (simplified heuristic)
                    let gender = 'Female';
                    let confidence = 0;

                    if (jawRatio > 1.6 || eyeToJawRatio < 0.35) {
                        gender = 'Male';
                        confidence = Math.min(95, 70 + (jawRatio - 1.5) * 20);
                    } else {
                        confidence = Math.min(95, 75 + (1.6 - jawRatio) * 15);
                    }

                    this.showResult(gender, confidence);
                    this.noFaceDiv.style.display = 'none';
                } else {
                    this.hideResult();
                    this.noFaceDiv.style.display = 'block';
                }
            }

            showResult(gender, confidence) {
                this.overlay.textContent = `${gender}`;
                this.overlay.innerHTML += `<div class="confidence">${confidence.toFixed(1)}% confidence</div>`;
                this.overlay.className = `result-overlay show gender-${gender.toLowerCase()}`;
            }

            hideResult() {
                this.overlay.classList.remove('show');
            }

            async startDetection() {
                await this.startVideo();
                this.isDetecting = true;
                this.startBtn.disabled = true;
                this.stopBtn.disabled = false;
                this.status.textContent = 'Detecting... Look at the camera!';
                
                const detect = () => {
                    if (this.isDetecting) {
                        this.detectGender();
                        this.animationId = requestAnimationFrame(detect);
                    }
                };
                detect();
            }

            stopDetection() {
                this.isDetecting = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                this.startBtn.disabled = false;
                this.stopBtn.disabled = true;
                this.status.textContent = 'Stopped';
                this.hideResult();
                this.noFaceDiv.style.display = 'none';
                
                if (this.video.srcObject) {
                    this.video.srcObject.getTracks().forEach(track => track.stop());
                    this.video.srcObject = null;
                }
            }
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            const detector = new GenderDetector();

            document.getElementById('startBtn').addEventListener('click', () => {
                detector.startDetection();
            });

            document.getElementById('stopBtn').addEventListener('click', () => {
                detector.stopDetection();
            });
        });
    </script>
</body>
</html>
